<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <title>金牛頓公文 - 窄版編輯區</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @media screen {
            body { 
                background: #f0f2f5; 
                display: flex; 
                height: 100vh; 
                overflow: hidden; 
                font-family: "Microsoft JhengHei"; 
            }
            
            /* 左側編輯區：寬度從 450px 調降至 380px */
            .editor-ui { 
                width: 380px; 
                background: #ffffff; 
                padding: 20px; 
                border-right: 1px solid #d1d5db; 
                height: 100%; 
                overflow-y: auto; 
                flex-shrink: 0; 
                z-index: 10;
            }

            .preview-container {
                flex-grow: 1;
                background: #525659; 
                overflow-y: auto; 
                overflow-x: hidden; 
                display: flex;
                justify-content: center; 
                padding: 20px 0; 
            }

            .input-row { margin-bottom: 15px; }
            label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; color: #374151; }
            input, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; }
            
            .slider-container { background: #eff6ff; padding: 12px; border-radius: 6px; border: 1px solid #bfdbfe; margin-bottom: 12px; }
            .slider-container.orange { background: #fff7ed; border: 1px solid #ffedd5; }
            .slider-container.green { background: #f0fdf4; border: 1px solid #dcfce7; }
            
            .flex-row { display: flex; gap: 10px; }
            .flex-item { flex: 1; }
            
            .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
            .print-btn { background: #ef4444; color: white; border: none; padding: 14px; cursor: pointer; font-weight: bold; border-radius: 6px; }
            .save-btn { background: #10b981; color: white; border: none; padding: 14px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        }

        #print-paper {
            width: 210mm;
            height: 297mm;
            background-color: white;
            font-family: "標楷體", "DFKai-SB", serif;
            position: relative;
            writing-mode: vertical-rl;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            flex-shrink: 0;
            /* 隨著側欄縮小，可以稍微調大縮放比例 (0.72 -> 0.78) 提升閱讀舒適度 */
            transform: scale(0.78); 
            transform-origin: top center;
            margin-bottom: -60mm; 
        }

        @media print {
            .editor-ui { display: none !important; }
            .preview-container { background: white !important; display: block !important; padding: 0 !important; overflow: visible !important; }
            body { background: white; overflow: visible; }
            @page { size: A4 portrait; margin: 0; }
            #print-paper { 
                width: 210mm !important; 
                height: 297mm !important; 
                transform: none !important; 
                box-shadow: none !important;
                margin: 0 !important;
            }
        }

        .logo-container { position: absolute; top: 5mm; left: 50%; transform: translateX(-50%); z-index: 1; writing-mode: horizontal-tb; text-align: center; width: 210mm; }
        .base-image { width: 185mm; display: inline-block; }
        .pos-abs { position: absolute; writing-mode: vertical-rl; z-index: 2; }
        .fix-title { right: 10mm; top: 70mm; font-size: 32pt; font-weight: bold; letter-spacing: 20px; }
        .fix-no { right: 12mm; top: 210mm; font-size: 18pt; font-family: "Arial"; font-weight: bold; height: 75mm; }
        .fix-date { left: 10mm; top: 45mm; height: 235mm; font-size: 20pt; text-align-last: justify; }
        .fix-seal-locked { left: 28mm; top: 45mm; height: 235mm; font-size: 36pt; font-weight: bold; letter-spacing: 12px; padding-top: 75mm; white-space: nowrap; z-index: 4; }
        .content-main { position: absolute; right: 28mm; top: 45mm; height: 235mm; width: 145mm; font-size: 18pt; text-align: justify; z-index: 3; }
        
        .item-row { display: flex; margin-bottom: 0px; }
        .label-bold { font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        .desc-container { display: flex; flex-direction: row; }
        .desc-number { font-weight: bold; flex-shrink: 0; white-space: nowrap; }
        .desc-text { text-align: justify; display: inline-block; }
    </style>
</head>
<body>

    <div class="editor-ui">
        <h3 style="text-align:center; color:#dc2626; margin-bottom:20px;">金牛頓智慧公文系統</h3>
        
        <div class="slider-container green">
            <label>🖼️ LOGO 寬度：<span id="logo_w_val">185</span>mm</label>
            <input type="range" id="in_logo_w" min="50" max="210" step="1" value="185">
            <input type="file" id="in_logo_file" accept="image/*" style="margin-top:10px; font-size:12px;">
        </div>

        <div class="slider-container">
            <label>📏 全域起始高度：<span id="top_val">54</span>mm</label>
            <input type="range" id="in_top_pos" min="10" max="150" step="1" value="54">
        </div>

        <div class="slider-container">
            <label>📏 版面行距：<span id="lh_val">1.95</span></label>
            <input type="range" id="in_lh" min="1.0" max="3.0" step="0.05" value="1.95">
        </div>

        <div class="slider-container orange">
            <label>🖊️ 落款位置微調</label>
            <div class="flex-row">
                <div class="flex-item">
                    <label>垂直：<span id="v_val">68</span>mm</label>
                    <input type="range" id="in_v_pos" min="10" max="120" step="1" value="68">
                </div>
                <div class="flex-item">
                    <label>水平：<span id="h_val">35</span>mm</label>
                    <input type="range" id="in_h_pos" min="10" max="180" step="1" value="35">
                </div>
            </div>
        </div>

        <div class="input-row"><label>發文編號</label><input type="text" id="in_no" value="PA26022401"></div>
        <div class="input-row"><label>發文日期</label><input type="text" id="in_date" value="中華民國115年2月24日"></div>
        <div class="input-row"><label>受文者</label><input type="text" id="in_to" value="全體同仁"></div>
        <div class="input-row"><label>主旨</label><textarea id="in_sub" style="height:60px;">和平紀念日假期事宜。</textarea></div>
        <div class="input-row"><label>說明內容</label>
            <textarea id="in_desc" style="height:180px;">一、依行政院人事行政總處核定之「115年政府行政機關辦公日曆表」辦理。
二、和平紀念日為民國115年2月28日(星期六)，根據《紀念日及節日實施條例》第 5-1 條規定，紀念日及節日之放假日逢例假日者應予補假：例假日為星期六者： 於前一個上班日(2月27日)補假。
三、假期中各部門主管暨指定同仁請依以往規定保持手機有電暨開啟狀態。</textarea>
        </div>
        <div class="input-row"><label>落款單位</label><input type="text" id="in_seal" value="總經理室"></div>
        
        <div class="btn-group">
            <button class="print-btn" onclick="window.print()">🖨️ 執行列印 (PDF)</button>
            <button class="save-btn" onclick="saveAsHTML()">💾 儲存 HTML 範本</button>
        </div>
    </div>

            <div id="out_flow" class="content-main" style="top: 54mm; line-height: 1.95;"><div class="item-row"><span class="label-bold">受文者：</span><span class="desc-text">全體同仁</span></div><div class="item-row"><span class="label-bold">主　旨：</span><span class="desc-text">和平紀念日假期事宜。</span></div><div class="item-row"><span class="label-bold">說　明：</span><div class="desc-container"><span class="desc-number">一、</span><span class="desc-text">依行政院人事行政總處核定之「115年政府行政機關辦公日曆表」辦理。</span></div></div><div class="item-row"><span style="visibility:hidden" class="label-bold">說　明：</span><div class="desc-container"><span class="desc-number">二、</span><span class="desc-text">和平紀念日為民國115年2月28日(星期六)，根據《紀念日及節日實施條例》第 5-1 條規定，紀念日及節日之放假日逢例假日者應予補假：例假日為星期六者： 於前一個上班日(2月27日)補假。</span></div></div><div class="item-row"><span style="visibility:hidden" class="label-bold">說　明：</span><div class="desc-container"><span class="desc-number">三、</span><span class="desc-text">假期中各部門主管暨指定同仁請依以往規定保持手機有電暨開啟狀態。</span></div></div></div>
            <div class="pos-abs fix-seal-locked" id="out_seal" style="top: 68mm; left: 35mm;">總經理室</div>

    <script>
        document.getElementById('in_logo_file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('logo_img').src = event.target.result;
                    setTimeout(sync, 100);
                };
                reader.readAsDataURL(file);
            }
        });

        function sync() {
            const logoW = document.getElementById('in_logo_w').value;
            document.getElementById('logo_w_val').innerText = logoW;
            document.getElementById('logo_img').style.width = logoW + 'mm';

            const topPos = document.getElementById('in_top_pos').value;
            document.getElementById('top_val').innerText = topPos;
            document.getElementById('out_flow').style.top = topPos + 'mm';
            document.getElementById('out_date').style.top = topPos + 'mm';

            const lh = document.getElementById('in_lh').value;
            document.getElementById('lh_val').innerText = lh;
            document.getElementById('out_flow').style.lineHeight = lh;

            const vPos = document.getElementById('in_v_pos').value;
            const hPos = document.getElementById('in_h_pos').value;
            document.getElementById('v_val').innerText = vPos;
            document.getElementById('h_val').innerText = hPos;
            document.getElementById('out_seal').style.top = vPos + 'mm';
            document.getElementById('out_seal').style.left = hPos + 'mm';

            document.getElementById('out_no').innerText = document.getElementById('in_no').value;
            document.getElementById('out_seal').innerText = document.getElementById('in_seal').value;
            document.getElementById('out_date').innerText = document.getElementById('in_date').value;
            
            const toVal = document.getElementById('in_to').value;
            const subVal = document.getElementById('in_sub').value;
            const descLines = document.getElementById('in_desc').value.split('\n');

            let html = `<div class="item-row"><span class="label-bold">受文者：</span><span class="desc-text">${toVal}</span></div>`;
            html += `<div class="item-row"><span class="label-bold">主　旨：</span><span class="desc-text">${subVal}</span></div>`;
            
            descLines.forEach((l, i) => {
                if(l.trim()){
                    html += `<div class="item-row">`;
                    html += i===0 ? `<span class="label-bold">說　明：</span>` : `<span style="visibility:hidden" class="label-bold">說　明：</span>`;
                    let match = l.match(/^([一二三四五六七八九十]+、)(.*)/);
                    if(match) {
                        html += `<div class="desc-container"><span class="desc-number">${match[1]}</span><span class="desc-text">${match[2]}</span></div>`;
                    } else {
                        html += `<span class="desc-text">${l}</span>`;
                    }
                    html += `</div>`;
                }
            });
            document.getElementById('out_flow').innerHTML = html;
        }

        function saveAsHTML() {
            document.querySelectorAll('input:not([type="file"])').forEach(i => i.setAttribute('value', i.value));
            document.querySelectorAll('textarea').forEach(t => t.innerHTML = t.value);
            document.getElementById('logo_img').setAttribute('src', document.getElementById('logo_img').src);
            const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `金牛頓公告_${document.getElementById('in_no').value}.html`;
            a.click();
        }

        window.onload = sync;
        document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('input', sync));
    </script>
