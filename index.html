<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行動戰情 - 金牛頓工業</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --text-white: #f8fafc;
            --text-dim: #94a3b8;
            --up-green: #4ade80;
            --down-red: #fb7185;
            --btn-bg: rgba(56, 189, 248, 0.1);
        }

        /* 驗證層 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #auth-input {
            border: none; border-bottom: 2px solid var(--accent-blue); width: 200px;
            font-size: 24px; text-align: center; outline: none; padding: 10px;
            background: transparent; color: white; letter-spacing: 5px;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        header { padding: 10px 0 15px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; }
        .header-title { font-size: 1.4rem; font-weight: bold; margin: 0; color: var(--accent-blue); }
        .time-badge { background: rgba(56, 189, 248, 0.15); color: var(--accent-blue); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }

        /* 網格佈局 */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .card-value { font-size: 1.25rem; font-weight: 800; font-family: 'Consolas', monospace; white-space: nowrap; }
        .card-footer { font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; display: block; }

        .full-card { grid-column: span 2; }
        .flex-row { display: flex; justify-content: space-between; align-items: baseline; }

        .target-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 4px 8px;
            border-radius: 6px; font-size: 1rem; width: 130px; text-align: right; font-family: 'Consolas';
        }

        .status-up { color: var(--up-green); }
        .status-down { color: var(--down-red); }

        .summary-bar {
            margin-top: 15px; background: rgba(255,255,255,0.03); 
            padding: 15px; border-radius: 12px; display: flex; 
            flex-direction: column; gap: 8px; font-size: 0.9rem;
        }
        .rate-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }

        /* 行事曆按鈕 */
        .calendar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            padding: 15px;
            background: var(--btn-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 12px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .calendar-btn:active {
            background: var(--accent-blue);
            color: #020617;
            transform: scale(0.98);
        }

        footer { text-align: center; padding: 30px 0; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }

        @media screen and (max-width: 400px) {
            .card-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <input type="password" id="auth-input" autofocus maxlength="8" placeholder="請輸入密碼">
    </div>

    <div class="container">
        <header>
            <div class="header-flex">
                <h1 class="header-title">行動戰情室</h1>
                <div class="time-badge" id="day-info">第 -- 天</div>
            </div>
            <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 5px;" id="update-time">載入中...</div>
        </header>

        <div class="grid">
            <div class="card full-card">
                <div class="flex-row">
                    <span class="card-label">每月營收目標</span>
                    <input type="text" id="monthly-target" class="target-input" value="7,500,000" onfocus="this.value=this.value.replace(/,/g,'')" onblur="formatCommas(this); calculateLogic()">
                </div>
                <div class="flex-row" style="margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
                    <span class="card-footer">年度總目標</span>
                    <span id="annual-target" style="font-weight: bold; font-size: 0.9rem; font-family: 'Consolas';">--</span>
                </div>
            </div>

            <div class="card">
                <span class="card-label">目前累積銷貨</span>
                <div class="card-value" id="total-sales">--</div>
                <span class="card-footer">未稅合計 (元)</span>
            </div>

            <div class="card">
                <span class="card-label" id="diff-label">進度分析</span>
                <div class="card-value" id="progress-status">--</div>
                <span class="card-footer">比對時間權重</span>
            </div>

            <div class="card">
                <span class="card-label">銷貨利潤合計</span>
                <div class="card-value status-up" id="total-profit">--</div>
                <span class="card-footer">扣除成本金額</span>
            </div>

            <div class="card">
                <span class="card-label">營業費用總計</span>
                <div class="card-value status-down" id="expense-val">--</div>
                <span class="card-footer">後台即時同步</span>
            </div>
        </div>

        <div class="summary-bar" id="rate-summary">
            <div class="rate-item"><span>年度達成率</span><span id="rate-achieve" class="status-up">--%</span></div>
            <div class="rate-item"><span>毛利率</span><span id="rate-margin">--%</span></div>
            <div class="rate-item) "><span>費用率</span><span id="rate-expense">--%</span></div>
        </div>

        <a href="https://o936157111-ops.github.io/company-calendar/" target="_blank" class="calendar-btn">
            📅 查看公司行事曆
        </a>

        <footer>© 2026 GOLD NEWTON INDUSTRIAL</footer>
    </div>

    <script>
        const SALES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv&t=" + Date.now();
        const EXP_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=1915259935&single=true&output=csv&t=" + Date.now();

        document.getElementById('auth-input').addEventListener('input', function() {
            const now = new Date();
            const pw = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            if (this.value === pw) document.getElementById('auth-overlay').style.display = 'none';
        });

        function fetchAll() {
            Papa.parse(EXP_URL, {
                download: true, header: false, skipEmptyLines: true,
                complete: function(res) {
                    let exp = 0;
                    if (res.data) {
                        outer: for (let row of res.data) {
                            for (let cell of row) {
                                let v = cell?.toString().replace(/,/g, '').trim();
                                if (v !== "" && !isNaN(parseFloat(v))) { exp = parseFloat(v); break outer; }
                            }
                        }
                    }
                    document.getElementById('expense-val').innerText = Math.round(exp).toLocaleString();
                    fetchSales();
                }
            });
        }

        function fetchSales() {
            Papa.parse(SALES_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    let s = 0, p = 0;
                    res.data.forEach(row => {
                        s += parseFloat(row['本幣未稅金額']?.toString().replace(/,/g, '')) || 0;
                        p += parseFloat(row['毛利']?.toString().replace(/,/g, '')) || 0;
                    });
                    document.getElementById('total-sales').innerText = Math.round(s).toLocaleString();
                    document.getElementById('total-profit').innerText = Math.round(p).toLocaleString();
                    calculateLogic(s, p);
                }
            });
        }

        function calculateLogic(s, p) {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff_ms = now - start;
            const dayOfYear = Math.floor(diff_ms / 86400000);
            document.getElementById('day-info').innerText = `2026年第 ${dayOfYear} 天`;
            
            let monthly = parseFloat(document.getElementById('monthly-target').value.replace(/,/g, '')) || 0;
            let annual = monthly * 12;
            document.getElementById('annual-target').innerText = 'NT$ ' + annual.toLocaleString();
            
            let diff = s - ((annual / 365) * dayOfYear);
            let progEl = document.getElementById('progress-status');
            progEl.innerText = Math.round(Math.abs(diff)).toLocaleString();
            progEl.className = 'card-value ' + (diff >= 0 ? 'status-up' : 'status-down');
            document.getElementById('diff-label').innerText = diff >= 0 ? '進度超前 (+)' : '進度落後 (-)';
            
            let exp = parseFloat(document.getElementById('expense-val').innerText.replace(/,/g, '')) || 0;
            document.getElementById('rate-achieve').innerText = `${(s/annual*100).toFixed(1)}%`;
            document.getElementById('rate-margin').innerText = `${(p/s*100).toFixed(1)}%`;
            document.getElementById('rate-expense').innerText = `${(exp/s*100).toFixed(1)}%`;
        }

        function formatCommas(i) { let v = parseFloat(i.value.replace(/,/g, '')); if(!isNaN(v)) i.value = v.toLocaleString(); }

        window.onload = () => {
            const now = new Date();
            document.getElementById('update-time').innerText = `數據同步：${now.toLocaleDateString()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            fetchAll();
        };
    </script>
</body>
</html>
