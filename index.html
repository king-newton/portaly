<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓工業 - 行動戰情室</title>
    <style>
        /* 驗證層：全螢幕白色蓋住內容 */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #auth-input {
            border: none; border-bottom: 2px solid #1a73e8; width: 200px;
            font-size: 24px; text-align: center; outline: none; padding: 10px; letter-spacing: 5px;
        }

        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background-color: #ffffff; color: #333333; }
        .container { max-width: 600px; margin: auto; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #eeeeee; padding-bottom: 15px; }
        .logo { width: 50px; height: 50px; object-fit: contain; }
        .header-text { display: flex; flex-direction: column; }
        h1 { font-size: 1.2rem; margin: 0; color: #222; }
        .subtitle { font-size: 0.8rem; color: #888; margin-top: 3px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #ffffff; padding: 20px; border-radius: 12px; text-decoration: none; color: #333; display: flex; flex-direction: column; border: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-label { font-size: 0.8rem; color: #1a73e8; margin-bottom: 8px; font-weight: bold; }
        .data-value { font-size: 1.4rem; color: #d93025; font-weight: 800; min-height: 1.6rem; }
        .full-width-card { grid-column: span 2; padding: 15px; text-align: center; justify-content: center; align-items: center; border: none; margin-top: 5px; font-weight: bold; background: #e8f0fe; color: #1967d2; border-radius: 12px; text-decoration: none;}
        footer { margin-top: 40px; font-size: 0.75rem; color: #aaaaaa; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <input type="password" id="auth-input" autofocus maxlength="8" placeholder="請輸入密碼">
</div>

<div class="container">
    <header>
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiQn6xjuG-I81vGfFkGiulp55TCfDojnd-B60w3yjt81XHWF6dWfFnP4uZWlyI7PiB6drX5N259UjpHGrjHzlQfzRcxhx2MbkMDTniiElsZFV9Y3UWgPi7X_cRyZiTYifnCisvqzQVy_krPvJCrED_JEErXfGSsWukxmkiCR0ZrbAJEBjixhP6FW68X4FXo/s16000-rw/logo.gif" alt="Logo" class="logo">
        <div class="header-text">
            <h1>整體現況</h1>
            <div class="subtitle">金牛頓工業股份有限公司</div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <span class="card-label">目前累計營收</span>
            <div id="revenue-val" class="data-value">0</div>
        </div>
        <div class="card">
            <span class="card-label">公司毛利率</span>
            <div id="margin-val" class="data-value">26.7%</div>
        </div>
        <div class="card">
            <span class="card-label">營業費用總計</span>
            <div id="expense-val" class="data-value">0</div>
        </div>
        <div class="card">
            <span class="card-label">營業費用率</span>
            <div id="expense-rate-val" class="data-value">0%</div>
        </div>
        <a href="https://o936157111-ops.github.io/company-calendar/" target="_blank" class="full-width-card">📅 公司行事曆</a>
    </div>

    <footer>© 2026 金牛頓工業股份有限公司 All Rights Reserved.</footer>
</div>

<script>
    // --- 1. 資料讀取部分 ---
    const revenueUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv';
    const expenseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=1915259935&single=true&output=csv';

    let globalRevenue = 0;
    let globalExpense = 0;

    function parseNum(str) {
        if (!str) return null;
        let n = parseFloat(str.replace(/[^\d.-]/g, ''));
        return isNaN(n) ? null : n;
    }

    async function updateDashboard() {
        const cacheBuster = "&t=" + Date.now();
        try {
            // 抓取營收
            const resR = await fetch(revenueUrl + cacheBuster);
            const dataR = await resR.text();
            let revSum = 0;
            dataR.split('\n').forEach(line => {
                let v = parseNum(line.split(',')[6]);
                if (v !== null) revSum += v;
            });
            globalRevenue = revSum;
            document.getElementById('revenue-val').innerText = Math.round(globalRevenue).toLocaleString();

            // 抓取費用
            const resE = await fetch(expenseUrl + cacheBuster);
            const dataE = await resE.text();
            dataE.split('\n').forEach(line => {
                if (line.includes("合計") || line.includes("總計")) {
                    let v = parseNum(line.split(',')[6]);
                    if (v !== null) globalExpense = Math.abs(v);
                }
            });
            document.getElementById('expense-val').innerText = Math.round(globalExpense).toLocaleString();

            // 計算比率
            if (globalRevenue > 0) {
                let rate = (globalExpense / globalRevenue) * 100;
                document.getElementById('expense-rate-val').innerText = rate.toFixed(1) + "%";
            }
        } catch (e) {
            console.error("Fetch Error:", e);
        }
    }

    // --- 2. 驗證控制部分 ---
    const authInput = document.getElementById('auth-input');
    const authScreen = document.getElementById('auth-screen');

    authInput.addEventListener('input', () => {
        const today = new Date();
        const correctPw = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
        
        if (authInput.value === correctPw) {
            authScreen.style.display = 'none'; // 移除遮罩
        }
    });

    // --- 3. 啟動 ---
    // 一進入網頁就開始抓資料，不需要等密碼輸入
    updateDashboard();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
