<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行動戰情 - 金牛頓工業</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --text-white: #f8fafc;
            --text-dim: #94a3b8;
            --up-green: #4ade80;
            --down-red: #fb7185;
            --btn-bg: rgba(56, 189, 248, 0.1);
        }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #auth-input {
            border: none; border-bottom: 2px solid var(--accent-blue); width: 200px;
            font-size: 24px; text-align: center; outline: none; padding: 10px;
            background: transparent; color: white; letter-spacing: 5px;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-white);
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
        }

        .container { padding: 20px; max-width: 1100px; margin: auto; }

        header { padding: 10px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.6rem; font-weight: bold; margin: 0; color: var(--accent-blue); letter-spacing: 1px; }
        .time-badge { background: var(--btn-bg); color: var(--accent-blue); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(56,189,248,0.3); }

        /* 電腦版：固定 3 欄，所有區塊等寬 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        .card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .card-label { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 10px; display: block; }
        .card-value { font-size: 1.45rem; font-weight: 800; font-family: 'Consolas', monospace; white-space: nowrap; }
        .card-footer { font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; display: block; }

        .flex-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }

        .target-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--accent-blue); padding: 5px 10px;
            border-radius: 6px; font-size: 1.1rem; width: 120px; text-align: right; font-family: 'Consolas';
        }

        .status-up { color: var(--up-green); }
        .status-down { color: var(--down-red); }

        /* 下方比率欄：電腦 2 欄 */
        .summary-bar {
            margin-top: 20px; background: rgba(56, 189, 248, 0.05); 
            padding: 15px; border-radius: 12px; border: 1px solid rgba(56,189,248,0.15);
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        .rate-item { display: flex; flex-direction: column; align-items: center; }
        .rate-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
        .rate-val { font-size: 1.2rem; font-weight: bold; color: white; }

        .calendar-btn {
            display: flex; align-items: center; justify-content: center;
            margin-top: 20px; padding: 15px;
            background: var(--btn-bg); border: 1px solid var(--accent-blue);
            border-radius: 12px; color: var(--accent-blue);
            text-decoration: none; font-weight: bold; font-size: 1rem;
            transition: all 0.2s ease;
        }
        .calendar-btn:hover { background: rgba(56, 189, 248, 0.2); }

        footer { text-align: center; padding: 30px 0; font-size: 0.7rem; color: var(--text-dim); opacity: 0.4; }

        /* --- 手機版面調整 --- */
        @media screen and (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            /* 第一個區塊(營收目標)在手機版佔滿整行(2欄)，視覺較穩重 */
            .card:first-child { grid-column: span 2; } 
            .card-value { font-size: 1.2rem; }
        }

        @media screen and (max-width: 480px) {
            .container { padding: 10px; }
            .card { padding: 12px; }
            .target-input { width: 100px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <input type="password" id="auth-input" autofocus maxlength="8" placeholder="請輸入日期密碼">
    </div>

    <div class="container">
        <header>
            <div class="header-flex">
                <h1 class="header-title">行動戰情室</h1>
                <div class="time-badge" id="day-info">第 -- 天</div>
            </div>
            <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 5px;" id="update-time">Loading...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="flex-row">
                    <span class="card-label">每月營收目標</span>
                    <input type="text" id="monthly-target" class="target-input" value="7,500,000" onfocus="this.value=this.value.replace(/,/g,'')" onblur="formatCommas(this); calculateLogic()">
                </div>
                <div class="flex-row" style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
                    <span class="card-footer">年度總目標</span>
                    <span id="annual-target" style="font-weight: bold; font-family: 'Consolas'; color: var(--accent-blue);">--</span>
                </div>
            </div>

            <div class="card">
                <span class="card-label">目前累積銷貨</span>
                <div class="card-value" id="total-sales">--</div>
                <span class="card-footer">未稅總計 (元)</span>
            </div>

            <div class="card">
                <span class="card-label" id="diff-label">進度分析</span>
                <div class="card-value" id="progress-status">--</div>
                <span class="card-footer">與權重目標差</span>
            </div>

            <div class="card">
                <span class="card-label">銷貨利潤合計</span>
                <div class="card-value status-up" id="total-profit">--</div>
                <span class="card-footer">已扣除成本</span>
            </div>

            <div class="card">
                <span class="card-label">營業費用總計</span>
                <div class="card-value status-down" id="expense-val">--</div>
                <span class="card-footer">後台同步數據</span>
            </div>

            <div class="card">
                <span class="card-label">年度達成率</span>
                <div class="card-value status-up" id="rate-achieve">--%</div>
                <span class="card-footer">年度總目標達成比</span>
            </div>
        </div>

        <div class="summary-bar">
            <div class="rate-item">
                <span class="rate-label">目前毛利率</span>
                <span id="rate-margin" class="rate-val">--%</span>
            </div>
            <div class="rate-item">
                <span class="rate-label">營業費用率</span>
                <span id="rate-expense" class="rate-val">--%</span>
            </div>
        </div>

        <a href="https://o936157111-ops.github.io/company-calendar/" target="_blank" class="calendar-btn">
            📅 查看公司行事曆
        </a>

        <footer>© 2026 GOLD NEWTON INDUSTRIAL</footer>
    </div>

    <script>
        const SALES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv&t=" + Date.now();
        const EXP_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=1915259935&single=true&output=csv&t=" + Date.now();

        document.getElementById('auth-input').addEventListener('input', function() {
            const now = new Date();
            const pw = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
            if (this.value === pw) document.getElementById('auth-overlay').style.display = 'none';
        });

        function fetchAll() {
            Papa.parse(EXP_URL, {
                download: true, header: false, skipEmptyLines: true,
                complete: function(res) {
                    let exp = 0;
                    if (res.data) {
                        outer: for (let row of res.data) {
                            for (let cell of row) {
                                let v = cell?.toString().replace(/[^0-9.]/g, '').trim();
                                if (v !== "" && !isNaN(parseFloat(v))) { exp = parseFloat(v); break outer; }
                            }
                        }
                    }
                    document.getElementById('expense-val').innerText = Math.round(exp).toLocaleString();
                    fetchSales();
                }
            });
        }

        function fetchSales() {
            Papa.parse(SALES_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    let s = 0, p = 0;
                    res.data.forEach(row => {
                        s += parseFloat(row['本幣未稅金額']?.toString().replace(/,/g, '')) || 0;
                        p += parseFloat(row['毛利']?.toString().replace(/,/g, '')) || 0;
                    });
                    document.getElementById('total-sales').innerText = Math.round(s).toLocaleString();
                    document.getElementById('total-profit').innerText = Math.round(p).toLocaleString();
                    calculateLogic(s, p);
                }
            });
        }

        function calculateLogic(s, p) {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const dayOfYear = Math.floor((now - start) / 86400000);
            document.getElementById('day-info').innerText = `2026年第 ${dayOfYear} 天`;
            
            let rawInput = document.getElementById('monthly-target').value.replace(/[^0-9.]/g, '');
            let monthly = parseFloat(rawInput) || 0;
            let annual = monthly * 12;
            document.getElementById('annual-target').innerText = Math.round(annual).toLocaleString();
            
            if (s === undefined) s = parseFloat(document.getElementById('total-sales').innerText.replace(/[^0-9.]/g, '')) || 0;
            if (p === undefined) p = parseFloat(document.getElementById('total-profit').innerText.replace(/[^0-9.]/g, '')) || 0;
            
            let timeWeightedTarget = (annual / 365) * dayOfYear;
            let diff = s - timeWeightedTarget;
            
            let progEl = document.getElementById('progress-status');
            let labelEl = document.getElementById('diff-label');
            progEl.innerText = Math.round(Math.abs(diff)).toLocaleString();
            
            if (diff >= 0) {
                progEl.className = 'card-value status-up';
                labelEl.innerText = '進度超前 (+)';
            } else {
                progEl.className = 'card-value status-down';
                labelEl.innerText = '進度落後 (-)';
            }
            
            let exp = parseFloat(document.getElementById('expense-val').innerText.replace(/[^0-9.]/g, '')) || 0;
            document.getElementById('rate-achieve').innerText = annual > 0 ? `${(s/annual*100).toFixed(1)}%` : '0%';
            document.getElementById('rate-margin').innerText = s > 0 ? `${(p/s*100).toFixed(1)}%` : '0%';
            document.getElementById('rate-expense').innerText = s > 0 ? `${(exp/s*100).toFixed(1)}%` : '0%';
        }

        function formatCommas(i) { 
            let v = parseFloat(i.value.replace(/[^0-9.]/g, '')); 
            if(!isNaN(v)) i.value = v.toLocaleString(); 
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('update-time').innerText = `Sync: ${now.toLocaleDateString()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            fetchAll();
        };
    </script>
</body>
</html>
