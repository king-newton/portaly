<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓工業 - 行動戰情室</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background-color: #ffffff; color: #333333; }
        .container { max-width: 600px; margin: auto; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #eeeeee; padding-bottom: 15px; }
        .logo { width: 50px; height: 50px; object-fit: contain; }
        .header-text { display: flex; flex-direction: column; }
        h1 { font-size: 1.2rem; margin: 0; color: #222; }
        .subtitle { font-size: 0.8rem; color: #888; margin-top: 3px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #ffffff; padding: 20px; border-radius: 12px; text-decoration: none; color: #333; display: flex; flex-direction: column; transition: all 0.2s ease; border: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .card-label { font-size: 0.8rem; color: #1a73e8; margin-bottom: 8px; font-weight: bold; }
        .data-value { font-size: 1.4rem; color: #d93025; font-weight: 800; min-height: 1.6rem; }
        .full-width-card { grid-column: span 2; padding: 15px; text-align: center; justify-content: center; align-items: center; border: none; margin-top: 5px; font-weight: bold; background: #e8f0fe; color: #1967d2; border-radius: 12px; text-decoration: none;}
        footer { margin-top: 40px; font-size: 0.75rem; color: #aaaaaa; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiQn6xjuG-I81vGfFkGiulp55TCfDojnd-B60w3yjt81XHWF6dWfFnP4uZWlyI7PiB6drX5N259UjpHGrjHzlQfzRcxhx2MbkMDTniiElsZFV9Y3UWgPi7X_cRyZiTYifnCisvqzQVy_krPvJCrED_JEErXfGSsWukxmkiCR0ZrbAJEBjixhP6FW68X4FXo/s16000-rw/logo.gif" alt="Logo" class="logo">
        <div class="header-text">
            <h1>整體現況</h1>
            <div class="subtitle">金牛頓工業股份有限公司</div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="card" onclick="checkDynamicPassword()">
            <span class="card-label">目前累計營收</span>
            <div id="revenue-val" class="data-value">讀取中...</div>
        </div>
        <div class="card" onclick="checkDynamicPassword()">
            <span class="card-label">公司毛利率</span>
            <div class="data-value">26.7%</div>
        </div>
        <div class="card" onclick="checkDynamicPassword()">
            <span class="card-label">營業費用總計</span>
            <div id="expense-val" class="data-value">讀取中...</div>
        </div>
        <div class="card" onclick="checkDynamicPassword()">
            <span class="card-label">營業費用率</span>
            <div id="expense-rate-val" class="data-value">...%</div>
        </div>
        <a href="https://o936157111-ops.github.io/company-calendar/" target="_blank" class="full-width-card">📅 公司行事曆</a>
    </div>
    <footer>© 2026 金牛頓工業股份有限公司</footer>
</div>

<script>
const revenueUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=0&single=true&output=csv';
const expenseUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWoViZ8oexk0ZDVaXPcbxplYRiadGzvcF0nM_dI0iSpVQUqCpgJeCFCIfWKX60De_YcN_xmkreBZUx/pub?gid=1915259935&single=true&output=csv';

function parseNum(str) {
    if (!str) return null;
    let s = str.trim().replace(/,/g, '');
    if (s.startsWith('(') && s.endsWith(')')) s = '-' + s.substring(1, s.length - 1);
    let n = parseFloat(s);
    return isNaN(n) ? null : n;
}

async function updateDashboard() {
    const cb = "&t=" + Date.now();
    try {
        // 1. 抓取營收
        const resR = await fetch(revenueUrl + cb);
        const csvR = await resR.text();
        const rowsR = csvR.split('\n');
        let revSum = 0;
        rowsR.forEach((line, idx) => {
            if (idx === 0) return; // 跳過第一列標題
            const cols = line.split(',');
            const val = parseNum(cols[6]); // 鎖定第 7 欄
            if (val !== null) revSum += val;
        });

        // 2. 抓取費用
        const resE = await fetch(expenseUrl + cb);
        const csvE = await resE.text();
        const rowsE = csvE.split('\n');
        let expVal = 0;
        for (let line of rowsE) {
            if (line.includes("合計") || line.includes("總計")) {
                const cols = line.split(',');
                // 找尋這一列中最大的數字，通常合計金額會是最大的
                let maxInRow = 0;
                cols.forEach(c => {
                    let v = Math.abs(parseNum(c) || 0);
                    if (v > maxInRow) maxInRow = v;
                });
                expVal = maxInRow;
                if (expVal > 0) break;
            }
        }

        // 3. 一次性更新 UI，防止跳動
        if (revSum > 0) {
            document.getElementById('revenue-val').innerText = Math.round(revSum).toLocaleString();
            if (expVal > 0) {
                document.getElementById('expense-val').innerText = Math.round(expVal).toLocaleString();
                document.getElementById('expense-rate-val').innerText = ((expVal / revSum) * 100).toFixed(1) + "%";
            }
        }
    } catch (e) {
        console.error("Fetch error:", e);
    }
}

function checkDynamicPassword() {
    const d = new Date();
    const pw = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
    if (prompt("") === pw) {
        window.open('https://king-newton.github.io/dashboard/', '_blank');
    }
}

window.onload = updateDashboard;
</script>
</body>
</html>
