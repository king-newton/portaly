<script>
function checkDynamicPassword(targetUrl) {
    var today = new Date();
    var yyyy = today.getFullYear();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var dd = String(today.getDate()).padStart(2, '0');
    // 密碼現在僅為當天日期 (YYYYMMDD)
    var correctPassword = yyyy + mm + dd;
    
    var input = prompt("請輸入驗證碼：");
    
    if (input === correctPassword) {
        window.open(targetUrl, '_blank');
    } else if (input !== null) {
        alert("驗證失敗。");
    }
}
</script>
