<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #ffffff; color: #333; 
        }
        
        .landing-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; gap: 50px;
        }

        .brand-inline { display: flex; align-items: center; gap: 20px; }

        /* 1. 翻轉動畫：載入時執行一次 */
        .logo-icon {
            animation: flipIn 1.5s ease-out forwards;
        }

        @keyframes flipIn {
            0% { transform: perspective(400px) rotateY(90deg); opacity: 0; }
            100% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
        }

        /* 2. 閃光效果容器 */
        .text-logo-wrapper {
            position: relative;
            overflow: hidden; /* 確保亮光不會跑出文字範圍 */
            display: inline-block;
        }

        /* 亮光特效層 */
        .text-logo-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shine 2s ease-in-out 1.5s forwards; /* 延遲 1.5s 在翻轉後開始 */
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .nav-link {
            text-decoration: none; color: #666; font-size: 0.9rem; letter-spacing: 3px;
            padding: 12px 30px; border: 1px solid #ddd; transition: 0.3s;
        }
        .nav-link:hover { color: #000; border-color: #000; }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="brand-inline">
            <!-- 翻轉圖示 -->
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgycBwl4acZWHME78WqStO8pF7LErCuigIL0Y6k1sO3cmCJViVewKnihzJRCA4x9zgriiGAsHmkJM5BzIzKsmF2xAgTvUask-vn5wJ43JPcg22edFuwgGTBFYn1VNmB5rRL-oANUzybjO27j6m9tuqqWUsBrvgiVhrHbIgkqDnZ361_kK5G3z_S8usoqaS8/s800/icon-standard.png" 
                 class="logo-icon" height="50" alt="Icon">
            
            <!-- 文字 Logo 加上閃光效果容器 -->
            <div class="text-logo-wrapper">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhHha3H0Dfbz6fjnvmtMrqe83Bk1gFzEN_UkEfC_cGm22tKqZheeXkeWDkHl-qXgyjrOrH6QpXnz1_qQ9IOmt77PtMPxqLhMeIlrc9Fpntb0ny_-nBliEbNn4JCyQR7ib0zhorK3OSSYZdrt35cN5Lb9EQ6o9oujSrPCPl7sHt0WgSuXL47mr4RvchCpbGB/w640-h72-rw/logo-standard.png" 
                     height="50" alt="KINGNEWTON Text">
            </div>
        </div>

        <a href="product.html" class="nav-link">Enter Smart Molding System</a>
    </div>

</body>
</html>
