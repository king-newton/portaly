<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGNEWTON - Intelligent Injection Molding</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #ffffff; color: #333; 
        }
        
        .landing-container { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; padding: 20px; box-sizing: border-box;
        }
        
        .content-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 40px;
            width: fit-content; max-width: 100%;
        }

        .brand-inline { display: flex; align-items: center; justify-content: center; gap: 20px; }

        /* 電腦版固定尺寸 */
        .logo-icon { 
            height: 60px; width: auto; 
            animation: doubleSpin 2.5s cubic-bezier(0.1, 0.5, 0.1, 1) forwards; 
        }
        .text-logo { height: 60px; width: auto; }

        @keyframes doubleSpin {
            0% { transform: rotateY(0deg); }
            30% { transform: rotateY(360deg); }
            100% { transform: rotateY(720deg); }
        }

        .text-logo-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .text-logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            animation: shine 1.2s ease-out 2.5s forwards; 
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 200%; } }

        .nav-btn-wrapper { opacity: 0; animation: fadeIn 0.8s ease-in 3.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-link {
            text-decoration: none; color: #666; font-size: 0.9rem; letter-spacing: 3px; 
            border: 1px solid #ccc; padding: 15px 30px; display: inline-block;
            transition: 0.3s; cursor: pointer; background: white; white-space: nowrap;
        }
        .nav-link:hover { color: #000; border-color: #000; }

        /* 手機版修正 */
        @media (max-width: 600px) {
            .content-wrapper { width: 90vw !important; }
            .brand-inline { gap: 10px; width: 100%; justify-content: center; }
            .logo-icon { height: 35px !important; }
            .text-logo { height: 35px !important; }
            
            /* 按鈕文字改短後，強制與上方對齊 */
            .nav-link { 
                width: 100% !important; 
                padding: 15px 0 !important; 
                box-sizing: border-box !important; 
                text-align: center;
                font-size: 0.8rem; /* 縮小一點字體，確保完全不溢出 */
            }
        }

        #viewer {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important;
            background: white; z-index: 99999; 
            justify-content: center; align-items: center; cursor: pointer;
        }
        #viewer img { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: contain !important; 
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="content-wrapper">
            <div class="brand-inline">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgycBwl4acZWHME78WqStO8pF7LErCuigIL0Y6k1sO3cmCJViVewKnihzJRCA4x9zgriiGAsHmkJM5BzIzKsmF2xAgTvUask-vn5wJ43JPcg22edFuwgGTBFYn1VNmB5rRL-oANUzybjO27j6m9tuqqWUsBrvgiVhrHbIgkqDnZ361_kK5G3z_S8usoqaS8/s800/icon-standard.png" 
                     class="logo-icon" alt="Icon">
                <div class="text-logo-wrapper">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhHha3H0Dfbz6fjnvmtMrqe83Bk1gFzEN_UkEfC_cGm22tKqZheeXkeWDkHl-qXgyjrOrH6QpXnz1_qQ9IOmt77PtMPxqLhMeIlrc9Fpntb0ny_-nBliEbNn4JCyQR7ib0zhorK3OSSYZdrt35cN5Lb9EQ6o9oujSrPCPl7sHt0WgSuXL47mr4RvchCpbGB/w640-h72-rw/logo-standard.png" 
                     class="text-logo" alt="KINGNEWTON Text">
                </div>
            </div>

            <div class="nav-btn-wrapper">
                <button class="nav-link" onclick="openViewer()">SMART MOLDING SYSTEM</button>
            </div>
        </div>
    </div>

    <div id="viewer" onclick="nextImage()">
        <img id="viewer-img" src="" alt="Card">
    </div>

    <script>
        let currentIndex = 1;
        const totalImages = 13;
        
        function openViewer() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            currentIndex = 1;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }
        
        function nextImage() {
            currentIndex++;
            if (currentIndex > totalImages) {
                if (document.exitFullscreen) document.exitFullscreen();
                document.getElementById('viewer').style.display = 'none';
            } else {
                updateViewer();
            }
        }
        
        function updateViewer() {
            document.getElementById('viewer-img').src = `https://king-newton.github.io/cards/SGES${currentIndex}.jpg`;
        }
    </script>
</body>
</html>
