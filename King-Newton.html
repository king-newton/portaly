<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGNEWTON - Intelligent Injection Molding</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #ffffff; color: #333; 
        }
        
        .landing-container { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; padding: 20px; box-sizing: border-box;
        }
        
        .content-wrapper { 
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            width: 100%; max-width: 800px; margin: 0 auto; box-sizing: border-box;
        }

        .brand-inline { 
            display: flex; align-items: center; justify-content: center; 
            gap: 20px; width: 100%; padding: 0 20px; box-sizing: border-box;
        }

        .logo-icon { 
            height: 60px; width: auto; flex-shrink: 0;
            animation: doubleSpin 2.5s cubic-bezier(0.1, 0.5, 0.1, 1) 0.5s forwards; 
        }
        
        .text-logo { height: 60px; width: auto; max-width: 100%; object-fit: contain; }

        @keyframes doubleSpin {
            0% { transform: rotateY(0deg); }
            30% { transform: rotateY(360deg); }
            100% { transform: rotateY(720deg); }
        }

        .text-logo-wrapper { position: relative; overflow: hidden; display: inline-block; flex-shrink: 1; }
        .text-logo-wrapper::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            animation: shine 1.2s ease-out 0.5s forwards; 
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 200%; } }

        .nav-btn-wrapper, .link-group { opacity: 1; width: 100%; display: flex; justify-content: center; }

        .nav-link {
            text-decoration: none; color: #666; font-size: 0.9rem; letter-spacing: 3px; 
            border: 1px solid #ccc; padding: 15px 30px; display: inline-block;
            transition: 0.3s; cursor: pointer; background: white; white-space: nowrap;
        }
        .nav-link:hover { color: #000; border-color: #000; }

        .link-group { gap: 20px; align-items: center; }
        .link-group img { 
            width: 50px; height: 50px; object-fit: contain; 
            transition: 0.3s; cursor: pointer; display: block; 
        }
        .link-group img:hover { transform: scale(1.1); }

        .person-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: rgba(0,0,0,0.8);
            z-index: 99999; justify-content: center; align-items: center; cursor: pointer;
            backdrop-filter: blur(5px); transition: opacity 0.3s; opacity: 0;
        }
        .person-modal.active { opacity: 1; display: flex; }
        .modal-body {
            background: #fff; padding: 50px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; gap: 40px; cursor: default;
        }

        .person-link { text-decoration: none; text-align: center; color: #333; }
        .avatar-wrap {
            width: 150px; height: 150px; border-radius: 50%;
            overflow: hidden; border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s; margin-bottom: 15px;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .person-name { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; }

        @media (max-width: 600px) {
            .brand-inline, .nav-link { 
                width: 100%; 
                max-width: 320px; 
            }
            .brand-inline { gap: 10px; }
            .logo-icon { height: 30px !important; }
            .text-logo { height: 30px !important; }
            
            .modal-body { flex-direction: column; padding: 30px; gap: 20px; }
            .avatar-wrap { width: 120px; height: 120px; }
        }

        #viewer {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important;
            background: white; z-index: 99999; 
            justify-content: center; align-items: center; cursor: pointer;
        }
        #viewer img { width: 100vw !important; height: 100vh !important; object-fit: contain !important; }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="content-wrapper">
            <div class="brand-inline">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgycBwl4acZWHME78WqStO8pF7LErCuigIL0Y6k1sO3cmCJViVewKnihzJRCA4x9zgriiGAsHmkJM5BzIzKsmF2xAgTvUask-vn5wJ43JPcg22edFuwgGTBFYn1VNmB5rRL-oANUzybjO27j6m9tuqqWUsBrvgiVhrHbIgkqDnZ361_kK5G3z_S8usoqaS8/s800/icon-standard.png" class="logo-icon" alt="Icon">
                <div class="text-logo-wrapper">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhHha3H0Dfbz6fjnvmtMrqe83Bk1gFzEN_UkEfC_cGm22tKqZheeXkeWDkHl-qXgyjrOrH6QpXnz1_qQ9IOmt77PtMPxqLhMeIlrc9Fpntb0ny_-nBliEbNn4JCyQR7ib0zhorK3OSSYZdrt35cN5Lb9EQ6o9oujSrPCPl7sHt0WgSuXL47mr4RvchCpbGB/w640-h72-rw/logo-standard.png" class="text-logo" alt="KINGNEWTON Text">
                </div>
            </div>
            <div class="nav-btn-wrapper">
                <button class="nav-link" onclick="openViewer()">SMART MOLDING SYSTEM</button>
            </div>
            <div class="link-group">
                <img src="https://king-newton.github.io/portaly/home.png" alt="Home">
                <a href=http://www.borche.cn/product/index3.html><img src="https://king-newton.github.io/portaly/Injection Molding Machine.png" alt="Machine"></a>
                <img src="https://king-newton.github.io/portaly/contact.gif" alt="Contact" onclick="openPersonViewer()">
            </div>
        </div>
    </div>
    <div id="viewer" onclick="nextImage()"><img id="viewer-img" src="" alt="Card"></div>
    <div id="person-viewer" class="person-modal" onclick="closePersonViewer()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <a href="https://king-newton.github.io/cards/portal-jimmy.html" target="_blank" class="person-link">
                <div class="avatar-wrap"><img src="https://king-newton.github.io/cards/pic-jimmy.jpg" alt="Jimmy"></div>
                <div class="person-name">Jimmy Lee</div>
            </a>
            <a href="https://king-newton.github.io/cards/portal-james.html" target="_blank" class="person-link">
                <div class="avatar-wrap"><img src="https://king-newton.github.io/cards/pic-james.jpg" alt="James"></div>
                <div class="person-name">James He</div>
            </a>
            <a href="https://king-newton.github.io/cards/portal-jeff.html" target="_blank" class="person-link">
                <div class="avatar-wrap"><img src="https://king-newton.github.io/cards/pic-jeff.jpg" alt="Jeff"></div>
                <div class="person-name">Jeff Yang</div>
            </a>
        </div>
    </div>
    <script>
        let currentIndex = 1; const totalImages = 13;
        function openViewer() { let elem = document.documentElement; if (elem.requestFullscreen) elem.requestFullscreen(); currentIndex = 1; updateViewer(); document.getElementById('viewer').style.display = 'flex'; }
        const personModal = document.getElementById('person-viewer');
        function openPersonViewer() { personModal.classList.add('active'); }
        function closePersonViewer() { personModal.classList.remove('active'); }
        function nextImage() { currentIndex++; if (currentIndex > totalImages) { if (document.exitFullscreen) document.exitFullscreen(); document.getElementById('viewer').style.display = 'none'; } else { updateViewer(); } }
        function updateViewer() { document.getElementById('viewer-img').src = `https://king-newton.github.io/cards/SGES${currentIndex}.jpg`; }
    </script>
</body>
</html>
