<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>內部聯絡單系統 - 2025功能完整版</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: "標楷體", serif; background-color: #444; overflow: hidden; }
        * { box-sizing: border-box; }
        
        /* 左側編輯面板 */
        .editor-side {
            width: 400px;
            background-color: #f7f7f7;
            padding: 15px;
            overflow-y: auto;
            border-right: 2px solid #000;
            flex-shrink: 0;
            font-family: "微軟正黑體", sans-serif;
        }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px; }
        .input-group input, .input-group select {
            width: 100%; padding: 6px; border: 1px solid #777; font-size: 14px; border-radius: 4px;
        }

        /* 內容區工具列 */
        .text-toolbar { 
            background: #e1e1e1; border: 2px solid #555; border-bottom: none; 
            padding: 6px; display: flex; gap: 6px; border-radius: 4px 4px 0 0; align-items: center; 
        }
        .text-toolbar select { height: 30px; font-size: 13px; cursor: pointer; border: 1px solid #999; background: white; }
        .text-toolbar button { height: 30px; width: 35px; font-weight: bold; cursor: pointer; border: 1px solid #999; background: white; }
        .text-toolbar button.active { background-color: #555 !important; color: white !important; }

        /* 富文本編輯區 */
        #in-content-rich { 
            width: 100%; height: 350px; border: 2px solid #555; background: #fff; 
            padding: 10px; border-radius: 0 0 4px 4px; font-size: 16px; 
            line-height: 1.2; outline: none; overflow-y: auto; word-break: break-all; 
        }
        #in-content-rich div { line-height: 1.2 !important; min-height: 1.2em; margin: 0; }
        
        /* 圖片容器 */
        .img-container { display: inline-block; margin: 0; width: 100%; position: relative; vertical-align: top; line-height: 0; }
        .img-container img { width: 100%; display: block; border: none; }
        .img-tools { background: #333; color: white; padding: 4px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-family: sans-serif; line-height: normal; }

        .btn { width: 100%; padding: 10px; cursor: pointer; font-weight: bold; font-size: 16px; border: none; border-radius: 4px; margin-top: 8px; }
        .btn-img { background: #007bff; color: #fff; }
        .btn-print { background: #000; color: #fff; }
        .btn-save { background: #28a745; color: #fff; }

        /* 右側預覽區 */
        .preview-side { flex-grow: 1; display: flex; justify-content: center; overflow-y: auto; padding: 10px; }
        .a4-page { width: 210mm; min-height: 297mm; background-color: white; padding: 5mm; display: flex; flex-direction: column; position: relative; color: #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .logo-banner { width: 100%; margin-bottom: 5px; text-align: center; }
        .logo-banner img { width: 100%; height: auto; display: block; }

        .title { text-align: center; font-size: 30px; font-weight: bold; letter-spacing: 20px; margin: 5px 0; padding-left: 20px; }
        .header-info { display: flex; justify-content: space-between; font-size: 20px; margin-bottom: 3px; padding: 0 5px; }
        
        .main-border-box { border: 2.5px solid black; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .layout-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .layout-table td { padding: 6px 12px; font-size: 20px; line-height: 1.1; vertical-align: middle; border: none; }
        
        .priority-list { display: flex; flex-direction: column; gap: 2px; width: 110px; }
        .box { width: 18px; height: 18px; border: 1.5px solid black; margin-right: 8px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; vertical-align: middle; }
        .checked::after { content: "✔"; font-size: 15px; font-family: Arial; font-weight: bold; }

        .date-underline { display: inline-block; min-width: 35px; border-bottom: 1.5px solid black; text-align: center; margin: 0 1px; }

        .content-area { padding: 12px; flex-grow: 1; word-break: break-all; line-height: 1.2; font-size: 20px; }
        .update-stamp { font-size: 12px; text-align: right; padding-top: 5px; font-family: Arial; }

        @media print {
            .editor-side, .img-tools { display: none !important; }
            .preview-side { padding: 0; }
            .a4-page { box-shadow: none; width: 100%; padding: 5mm; margin: 0; }
        }
    </style>
</head>
<body onmouseup="updateToolbar()" onkeyup="updateToolbar()">

<div class="editor-side">
    <h3 style="text-align: center; margin-top:0;">聯絡單編輯面板</h3>
    <div class="input-group"><label>編號 (MD-)</label><input type="text" id="in-no" oninput="sync()" placeholder="填寫編號"></div>
    <div class="input-group"><label>受文者</label><input type="text" id="in-receiver" oninput="sync()" value="總經理室"></div>
    <div class="input-group"><label>發文日期</label><input type="date" id="in-date" onchange="sync()"></div>
    <div class="input-group"><label>完成時間 (收文日期)</label><input type="date" id="in-finish-date" onchange="sync()"></div>
    <div class="input-group"><label>案件等級</label>
        <select id="in-level" onchange="sync()">
            <option value="普通">普通</option><option value="速件">速件</option><option value="急速件">急速件</option>
        </select>
    </div>
    <div class="input-group"><label>副本對象</label><input type="text" id="in-copy" oninput="sync()"></div>
    
    <div class="input-group">
        <label>聯絡內容</label>
        <div class="text-toolbar">
            <select style="width:100px;" onchange="document.execCommand('fontName', false, this.value); sync();">
                <option value="標楷體" selected>標楷體</option>
                <option value="微軟正黑體">微軟正黑體</option>
            </select>
            <select style="width:60px;" onchange="applyFontSize(this.value)">
                <option value="13px">13</option><option value="16px" selected>16</option><option value="18px">18</option>
                <option value="24px">24</option><option value="32px">32</option><option value="48px">48</option>
            </select>
            <button id="btn-bold" onclick="document.execCommand('bold', false, null); sync();">B</button>
            <button id="btn-under" onclick="document.execCommand('underline', false, null); sync();">U</button>
        </div>
        <div id="in-content-rich" contenteditable="true" oninput="sync()"></div>
    </div>
    
    <button class="btn btn-img" onclick="document.getElementById('img-upload').click()">📷 插入圖片</button>
    <input type="file" id="img-upload" style="display:none" accept="image/*" onchange="insertImage(this)">
    
    <button onclick="saveHtml()" class="btn btn-save">💾 儲存 HTML 檔案</button>
    <button onclick="window.print()" class="btn btn-print">確認列印 / PDF</button>
</div>

<div class="preview-side">
    <div class="a4-page">
        <div class="logo-banner">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiffMYfJsUf9f_OOhBFxWzSefgRU39Fuy2OmNDBAEtbPKoblBz60DuNwGzvLRgtCxGSSiHC0Thtag2WJIQSaPx9PGHBQtFxKNFWmUhbVTz4oB5utNrCwY0xfaTzu-c4jxetggHDF8U75Wkz-bbtl6nYREKnLOb9KxMxjKICx-gFFH2jxF50fc1js-4CMrpK/w640-h152-rw/%E9%87%91%E7%89%9B%E9%A0%93LOGO-2026-06-10.jpg">
        </div>

        <div class="title">內 部 聯 絡 單</div>

        <div class="header-info">
            <div>編號: MD-<span id="out-no"></span></div>
            <div>日期：<span id="out-y"></span> 年 <span id="out-m"></span> 月 <span id="out-d"></span> 日</div>
        </div>

        <div class="main-border-box">
            <div style="border-bottom: 2.5px solid black;">
                <table class="layout-table">
                    <tr>
                        <td width="65%"><strong>受文者：<span id="out-receiver">總經理室</span></strong></td>
                        <td width="35%">
                            <div style="display: flex; justify-content: flex-end;">
                                <div class="priority-list">
                                    <div style="display:flex; align-items:center;"><span id="box1" class="box"></span>急速件</div>
                                    <div style="display:flex; align-items:center;"><span id="box2" class="box"></span>速件</div>
                                    <div style="display:flex; align-items:center;"><span id="box3" class="box"></span>普通</div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"><strong>副本:</strong> <span id="out-copy" style="border-bottom: 1.5px solid black; min-width: 280px; display: inline-block;"></span></td>
                    </tr>
                    <tr><td colspan="2" style="border-bottom: none !important; padding-bottom: 2px;"><strong>發文者: 行管部</strong></td></tr>
                </table>
                <table class="layout-table" style="border-top: none !important;">
                    <tr>
                        <td width="55%"><strong>收文者簽回:</strong> ________________</td>
                        <td width="45%" style="text-align: right;">
                            <strong>完成時間：</strong>
                            <span class="date-underline" id="f-y">&nbsp;&nbsp;&nbsp;&nbsp;</span>年
                            <span class="date-underline" id="f-m">&nbsp;&nbsp;</span>月
                            <span class="date-underline" id="f-d">&nbsp;&nbsp;</span>日
                        </td>
                    </tr>
                </table>
            </div>
            <div class="content-area" id="out-content"></div>
        </div>
        <div class="update-stamp">2025.12.21 更新 By Eric</div>
    </div>
</div>

<script>
    document.execCommand('defaultParagraphSeparator', false, 'div');

    function applyFontSize(size) {
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        const span = document.createElement('span');
        span.style.fontSize = size;
        span.style.lineHeight = "1.2";

        if (!range.collapsed) {
            span.appendChild(range.extractContents());
            range.insertNode(span);
        } else {
            const zws = document.createTextNode('\u200B');
            span.appendChild(zws);
            range.insertNode(span);
            const newRange = document.createRange();
            newRange.setStart(zws, 1);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
        }
        sync();
    }

    function insertImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const container = document.createElement('div');
                container.className = 'img-container';
                container.contentEditable = "false";
                container.innerHTML = `<img src="${e.target.result}"><div class="img-tools"><span>寬度 <input type="range" min="10" max="100" value="100" oninput="adjImg(this,'w')"></span><span>位置 <input type="range" min="0" max="90" value="0" oninput="adjImg(this,'x')"></span><button style="background:red; color:white; border:none; padding:2px 8px; cursor:pointer;" onclick="this.closest('.img-container').remove(); sync();">刪除</button></div>`;
                document.getElementById('in-content-rich').appendChild(container);
                sync();
            };
            reader.readAsDataURL(input.files[0]);
            input.value = "";
        }
    }

    function adjImg(el, type) {
        const container = el.closest('.img-container');
        const img = container.querySelector('img');
        if (type === 'w') img.style.width = el.value + '%';
        if (type === 'x') img.style.marginLeft = el.value + '%';
        sync();
    }

    function sync() {
        document.getElementById('out-no').innerText = document.getElementById('in-no').value;
        document.getElementById('out-receiver').innerText = document.getElementById('in-receiver').value;
        document.getElementById('out-copy').innerText = document.getElementById('in-copy').value;

        const sd = (inId, yId, mId, dId) => {
            const v = document.getElementById(inId).value;
            if (v) {
                const d = new Date(v);
                document.getElementById(yId).innerText = d.getFullYear() - 1911;
                document.getElementById(mId).innerText = d.getMonth() + 1;
                document.getElementById(dId).innerText = d.getDate();
            }
        };
        sd('in-date', 'out-y', 'out-m', 'out-d');
        sd('in-finish-date', 'f-y', 'f-m', 'f-d');

        const lv = document.getElementById('in-level').value;
        document.getElementById('box1').classList.toggle('checked', lv === '急速件');
        document.getElementById('box2').classList.toggle('checked', lv === '速件');
        document.getElementById('box3').classList.toggle('checked', lv === '普通');

        const rich = document.getElementById('in-content-rich').innerHTML;
        const temp = document.createElement('div');
        temp.innerHTML = rich;
        temp.querySelectorAll('.img-tools').forEach(t => t.remove());
        document.getElementById('out-content').innerHTML = temp.innerHTML.replace(/\u200B/g, '');
    }

    function updateToolbar() {
        document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
        document.getElementById('btn-under').classList.toggle('active', document.queryCommandState('underline'));
    }

    function saveHtml() {
        sync();
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        const no = document.getElementById('in-no').value || '未命名';
        a.href = URL.createObjectURL(blob);
        a.download = `內部聯絡單_${no}.html`;
        a.click();
    }

    window.onload = function() {
        document.getElementById('in-date').value = new Date().toISOString().split('T')[0];
        sync();
    };
</script>

</body>
</html>
