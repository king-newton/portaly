<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李彥輪 - 數位名片</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        
        /* 翻轉卡片容器 */
        .flip-card { background-color: transparent; width: 300px; height: 180px; margin: auto; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner, .flip-card.active .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .flip-card-back { transform: rotateY(180deg); }
        
        img { width: 100%; height: 100%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn { display: inline-block; padding: 15px 30px; background-color: #fca311; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <h3>點擊名片即可翻面</h3>
    
    <div class="flip-card" onclick="this.classList.toggle('active')">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="jimmy-ch1.jpg" alt="名片正面">
            </div>
            <div class="flip-card-back">
                <img src="jimmy-ch2.jpg" alt="名片背面">
            </div>
        </div>
    </div>

    <br>
    <a href="contact.vcf" class="btn">儲存聯絡人到手機</a>

    <script>
        // 可選：若要在手機上更靈敏，這段 JavaScript 確保點擊有效
        document.querySelector('.flip-card').addEventListener('click', function() {
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
